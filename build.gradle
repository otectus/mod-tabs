plugins {
    id 'eclipse'
    id 'idea'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.48-beta'
}

version = minecraft_version + '-' + mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21+, so your mod should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'}), Arch: ${System.getProperty 'os.arch'}"
neoForge {
    // The version of NeoForge to use.
    version = project.neo_version

    parchment {
        minecraftVersion = project.parchment_minecraft_version
        mappingsVersion = project.parchment_mappings_version
    }

    // Set the mappings to use for deobfuscated access to Minecraft.
    accessTransformers {
        // Currently, this location cannot be changed from the default.
        file('src/main/resources/META-INF/accesstransformer.cfg')
        // However, the following line can be used to specify an additional file to read access transformers from. These files must be in the same format as the main access transformer file.
        // file('src/main/resources/META-INF/accesstransformer_extra.cfg')
    }

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        // applies to all the run configs below
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'neoforge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            systemProperty 'neoforge.logging.console.level', 'debug'
        }

        client {
            type = "client"
            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            type = "server"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            programArgument '--nogui'
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            type = "data"
            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // workingDirectory project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
    }

    mods {
        // define mod <-> source mappings
        // these are used to determine which sources are compiled against which mods
        // in multi-mod projects, this allows you to have multiple mods in a single project
        // note that a mod is identified by the name used for the run configuration
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}


// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    // Put repositories for dependencies here
    // ForgeGradle automatically adds the Forge maven and Maven Central for you

    // Curseforge repository
    maven {
        url = "https://www.cursemaven.com"
        content {
            includeGroup "curse.maven"
        }
    }
    // curios repository

    maven {
        name = "CurseForge"
        url = "https://minecraft.curseforge.com/api/maven/"
    }

    maven { url "https://api.modrinth.com/maven" }

    // Midnight Lib repository
    maven {
        url "https://maven.terraformersmc.com/releases/"
    }

    // Sinytra repository
    maven {
        name = "Sinytra"
        url = "https://maven.sinytra.org/releases"
    }

    // Local flat directory for external JARs
    flatDir {
        dirs 'libs'
    }
}

// Define configurations before dependencies
configurations {
    fabricMods
}

dependencies {
    // External libraries.

    // Midnight Lib - Required dependency for in-game config
    implementation "maven.modrinth:midnightlib:${project.midnightlib_version}"

    // === Wildex testing run: only Wildex + midnightlib load at runtime. ===
    // The four mods below are kept on the *compile* classpath because tab classes
    // (InventoryTab, FtbTeamsTab, PufferfishsSkillsTab, IntegrationUtils for
    // travelers-backpack) reference their classes directly. At runtime each call
    // site is guarded by ModList.isModLoaded(...) so the JVM never tries to
    // resolve them when the mod isn't present.
    compileOnly("curse.maven:curios-309927:6529130")
    compileOnly("curse.maven:ftb-teams-forge-404468:6119437")
    compileOnly("curse.maven:puffish-skills-835091:6798466")
    compileOnly("curse.maven:travelers-backpack-321117:6687139")

    // Wildex Bestiary. Reflection-only integration; config gating mirrors the mod's
    // own keybind via WildexClientConfigView.requireBookForKeybind().
    // Sourced from Modrinth — CurseForge file id 7785157 has third-party downloads
    // disabled, so cursemaven returns 403; the mod is the same artifact either way.
    implementation("maven.modrinth:wildex-bestiary:3.0.0")

