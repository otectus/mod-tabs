// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            neo_version: neo_version, neo_version_range: neo_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: version,
            mod_authors: mod_authors, mod_description: mod_description,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
        expand replaceProperties
    }
}

// Example for how to get properties into the manifest for reading at runtime.
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
                'Specification-Title'     : mod_id,
                'Specification-Vendor'    : mod_authors,
                'Specification-Version'   : '1', // We are version 1 of ourselves
                'Implementation-Title'    : project.name,
                'Implementation-Version'  : project.jar.archiveVersion,
                'Implementation-Vendor'   : mod_authors,
                'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

// Task to download runtime mods for dev environment
configurations {
    devMods
}

dependencies {
    // Disabled for fast Wildex test runs — Sinytra/Fabric API only needed when
    // testing fabricMods integrations (RPG Crafting etc.).
    //devMods "curse.maven:sinytra-connector-890127:6944771"
    //devMods "curse.maven:forgified-fabric-api-889079:7009993"
    // Fabric mods removed from devMods - they're in fabricMods configuration instead
}

task copyDevMods(type: Copy) {
    from configurations.devMods
    into file('run/mods')
    doFirst {
        file('run/mods').mkdirs()
    }
}

// Run copyDevMods before running the client (will auto-run when needed)
tasks.whenTaskAdded { task ->
    if (task.name == 'runClient' || task.name == 'prepareRun') {
        task.dependsOn copyDevMods
    }
}

// Note: Fabric mods are NOT bundled in the jar for production
// They should be installed separately alongside Sinytra Connector
// Bundling them causes class loading issues with intermediary mappings
tasks.named('jar', Jar).configure {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    // Don't bundle fabricMods - they need to be separate mods
}

// NeoForge 1.21.1 doesn't require reobfuscation like older Forge versions
// The jar task produces the final mod jar directly

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}
