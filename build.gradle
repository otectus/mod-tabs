plugins {
    id 'eclipse'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = minecraft_version + '-' + mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

// Minecraft 26.1+ requires Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

println "Java: ${System.getProperty 'java.version'}, JVM: ${System.getProperty 'java.vm.version'} (${System.getProperty 'java.vendor'})"

neoForge {
    version = project.neo_version

    // Parchment removed: Minecraft 26.1 is fully unobfuscated, so Mojang parameter names are already present.

    runs {
        configureEach {
            systemProperty 'neoforge.logging.markers', 'REGISTRIES'
            systemProperty 'neoforge.logging.console.level', 'debug'
        }
        client {
            type = "client"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            type = "server"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            programArgument '--nogui'
        }
        data {
            type = "data"
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    maven {
        url = "https://www.cursemaven.com"
        content { includeGroup "curse.maven" }
    }
    maven { url "https://api.modrinth.com/maven" }      // MidnightLib
    mavenCentral()
}

dependencies {
    // MidnightLib — required for the in-game config system (has a 26.1 NeoForge build).
    implementation "maven.modrinth:midnightlib:${project.midnightlib_version}"

    // Sophisticated Backpacks + Core — compile against them for the SophisticatedBackpacksTab.
    // Runtime presence is gated by ModList.isLoaded(...). Re-resolve these 26.1.2 file IDs at build time.
    // TODO(port): confirm/refresh CurseForge file IDs for 26.1.2 before the runtime smoke test.
    compileOnly("curse.maven:sophisticated-core-618298:8337377")        // sophisticatedcore-26.1.2-1.4.75.2082
    compileOnly("curse.maven:sophisticated-backpacks-422301:8034904")   // sophisticatedbackpacks-26.1.2-3.25.55.1739
}

tasks.named('processResources', ProcessResources).configure {
    var replaceProperties = [
            minecraft_version: minecraft_version, minecraft_version_range: minecraft_version_range,
            neo_version: neo_version, neo_version_range: neo_version_range,
            loader_version_range: loader_version_range,
            mod_id: mod_id, mod_name: mod_name, mod_license: mod_license, mod_version: version,
            mod_authors: mod_authors, mod_description: mod_description,
            mod_homepage: mod_homepage, mod_issues: mod_issues, mod_credits: mod_credits,
    ]
    inputs.properties replaceProperties
    filesMatching(['META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
        expand replaceProperties
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
